name: Keep Render backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_HEALTH_URL: https://ventadibus.onrender.com/api/health
        run: |
          curl --fail --silent --show-error --max-time 30 "$RENDER_HEALTH_URL"
