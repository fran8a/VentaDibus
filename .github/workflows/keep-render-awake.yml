name: Keep Render backend awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_HEALTH_URL: https://ventadibus.onrender.com/api/health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 6 \
            --retry-delay 10 \
            --retry-all-errors \
            --max-time 60 \
            "$RENDER_HEALTH_URL"
